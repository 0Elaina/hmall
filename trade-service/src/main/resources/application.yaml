server:
  port: 8085
hm:
  db:
    database: hm-trade
  swagger:
    title: 黑马商城交易服务接口文档
    description: 黑马商城交易服务接口文档
    package: com.hmall.trade.controller
feign:
  okhttp:
    enabled: true # 开启OKHttp连接池支持
  sentinel:
    enabled: true # 开启Feign对Sentinel的整合
spring:
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8090 # 配置sentinel控制台地址
      http-method-specify: true # 允许使用GET/POST/PUT/DELETE等HTTP方法作为请求名称